services:
  api:
    build:
      context: .
      args:
        RAILS_ENV: development
        BUNDLE_WITHOUT: ""
    environment:
      RAILS_ENV: development
      RACK_ENV: development
      MONGODB_HOST: mongo:27017
      MONGODB_DATABASE: barbearia_api_development
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    command: ./bin/rails server -b 0.0.0.0 -p 3000

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
